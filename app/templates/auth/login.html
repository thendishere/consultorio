{% extends "base.html" %}
{% block title %}Iniciar sesión — Consultorio de la Amistad{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🏥</div>
            <h1>Bienvenido</h1>
            <p>Consultorio de la Amistad</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <span class="alert-icon">⚠</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" action="/auth/login" class="auth-form">
            {{ csrf_input(request) }}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ form.email if form else '' }}"
                    placeholder="usuario@consultorio.com"
                    autocomplete="email"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-password">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" data-target="password" aria-label="Mostrar contraseña">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg auth-submit">
                Iniciar sesión
            </button>
        </form>
    </div>
</div>
{% endblock %}
